name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests + reproducer
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: PYTHONPATH=. pytest tests/ -q

      - name: Run reproducer (the case study)
        run: |
          python run_audit.py
          # exits 0 on success; CI fails if reproducer crashes

      - name: Regenerate paper figures from data/
        run: |
          pip install matplotlib
          python papers/eval_trust/scripts/make_figures.py
          # ensures figures are reproducible from data/ alone

      - name: Lint
        run: |
          ruff check eval_trust/ tests/ run_audit.py papers/eval_trust/scripts/
