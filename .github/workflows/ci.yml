name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests + reproducer
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: PYTHONPATH=. pytest tests/ -q

      - name: Run self-test benchmark (synthetic ground truth)
        run: |
          python benchmarks/self_test.py
          # checks toolkit verdict matches analytical truth on
          # NO_SIGNAL and REAL_SIGNAL synthetic scenarios

      - name: Run reproducer (the case study)
        run: |
          python run_audit.py
          # exits 0 on success; CI fails if reproducer crashes

      - name: Regenerate paper figures from data/
        run: |
          pip install matplotlib
          python papers/eval_trust/scripts/make_figures.py
          # ensures figures are reproducible from data/ alone

      - name: Run all 10 examples
        run: |
          for f in examples/recipe*.py; do
            echo "--- $f ---"
            python "$f" || exit 1
          done

      - name: Lint
        run: |
          ruff check eval_trust/ tests/ run_audit.py papers/eval_trust/scripts/ benchmarks/ examples/

  paper:
    name: paper builds (pandoc + tectonic)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install matplotlib (needed for figure regen)
        run: pip install matplotlib

      - name: Regenerate figures (paper depends on them)
        run: python papers/eval_trust/scripts/make_figures.py

      - name: Install pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qqy pandoc

      - name: Install tectonic
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL \
              https://drop-sh.fullyjustified.net | sh
          sudo mv tectonic /usr/local/bin/

      - name: Build arxiv tar + sanity-compile PDF
        run: bash papers/eval_trust/scripts/prepare_arxiv.sh

      - name: Verify outputs exist
        run: |
          test -f papers/eval_trust/draft.pdf
          test -f papers/eval_trust/arxiv_upload.tar.gz
          ls -lah papers/eval_trust/draft.pdf papers/eval_trust/arxiv_upload.tar.gz
